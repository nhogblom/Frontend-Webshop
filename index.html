<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css" />

  </head>
  <body>
    <div class="container">
      <!-- Header-->
      <div class="header">
        <div class="brand">
         <h1>BRANDNAME</h1>
        </div>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#">Shop</a>
            <a href="#">Contact</a>
            <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="#"><i class="fa-regular fa-user"></i></a>
            <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
        </nav>
      </div> 
      <!-- Showcase --> 
    <div class="showcase">
        <h1>Step into Style</h1>
        <p>Explore our exclusive collection of premium shoes.</p>
    
        <a href="#" class="btn">Shop Now</a>
    </div>
    <!-- Filter and  -->
    <div class="filter">
        <div class="categories">
            <button class="filter-toggle">Filter</button>
            <button class="filterbtn activefilterbtn"> 
                All
            </button>
            <button class="filterbtn">
                New Arrivals
            </button>
            <button class="filterbtn">
                Men
            </button>
            <button class="filterbtn">
                Women
            </button>
        </div>
        <div class="filter-magic-stars">
          <img src="images/stars.png" alt="Filter Magic Stars" />
        </div>
    </div>
    <!-- Products -->
    <div class="products">
        <div class="product-card">
            <img src="images/shoes/1.png" alt="Product 1" />
            <div class="product-information">
            <h2>Classic White Sneakers</h2>
            <p>120 USD</p>
            </div>
        </div>
        <div class="product-card">
            <img src="images/shoes/2.png" alt="Product 2" />
            <div class="product-information">
            <h2>Brown Leather Boots</h2>
            <p>250 USD</p>
              </div>
        </div>
        <div class="product-card">
            <img src="images/shoes/3.png" alt="Product 3" />
            <div class="product-information">
            <h2>Black Running Shoes</h2>
            <p>135 USD</p>
              </div>
        </div>
            <div class="product-card">
            <img src="images/shoes/4.png" alt="Product 4" />
            <div class="product-information">
            <h2>Stylish Beige Heels</h2>
            <p>180 USD</p>
        </div></div>


    </div>
        <!-- Footer -->
         <div class="footer">
            <p>&copy; 2026 BRANDNAME. All rights reserved.</p>
        </div>

  </body>
</html>
